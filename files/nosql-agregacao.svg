<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" background-color="transparent">
  <!-- Definição de Cores e Estilos -->
  <defs>
    <!-- Gradiente para o Fundo dos Títulos -->
    <linearGradient id="gradHeader" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" /> <!-- Azul Escuro -->
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" /> <!-- Azul Médio -->
    </linearGradient>
  </defs>

  <style>
    /* Estilo do Box Principal */
    .box { fill: #f0f2f5; stroke: #34495e; stroke-width: 1.5; rx: 3; ry: 3; } /* Cinza muito claro */
    
    /* Estilo da área do Título */
    .header-rect { fill: url(#gradHeader); stroke: #34495e; stroke-width: 1.5; rx: 3; ry: 3; }
    
    /* Estilo do Texto */
    .text-title { font-family: 'Open Sans', 'Helvetica Neue', Arial, sans-serif; font-weight: bold; font-size: 14px; text-anchor: middle; fill: #ffffff; } /* Branco */
    .text-attr { font-family: 'Open Sans', 'Helvetica Neue', Arial, sans-serif; font-size: 12px; fill: #1e2a36; } /* Azul muito escuro */
    
    /* Estilo das Linhas */
    .line { stroke: #2c3e50; stroke-width: 1.5; fill: none; }
    
    /* Estilo dos Losangos */
    .diamond { fill: #c0392b; stroke: #a53226; } /* Vermelho escuro */
  </style>

  <!-- PRODUTO -->
  <g transform="translate(50, 90)">
    <rect x="0" y="0" width="130" height="90" class="box" />
    <rect x="0" y="0" width="130" height="30" class="header-rect" /> <!-- Área do título -->
    <text x="65" y="20" class="text-title">PRODUTO</text>
    <text x="10" y="45" class="text-attr">nome</text>
    <text x="10" y="60" class="text-attr">categoria</text>
    <text x="10" y="75" class="text-attr">fabricante</text>
  </g>

  <!-- MOVIMENTACOES -->
  <g transform="translate(50, 310)">
    <rect x="0" y="0" width="130" height="150" class="box" />
    <rect x="0" y="0" width="130" height="30" class="header-rect" />
    <text x="65" y="20" class="text-title">MOVIMENTACOES</text>
    <text x="10" y="45" class="text-attr">produto_id</text>
    <text x="10" y="60" class="text-attr">data_hora</text>
    <text x="10" y="75" class="text-attr">local_id</text>
    <text x="10" y="90" class="text-attr">usuario_id</text>
    <text x="10" y="105" class="text-attr">nota_fiscal_id</text>
    <text x="10" y="120" class="text-attr">tipo</text>
    <text x="10" y="135" class="text-attr">status</text>
  </g>

  <!-- ALERTAS -->
  <g transform="translate(50, 560)">
    <rect x="0" y="0" width="130" height="110" class="box" />
    <rect x="0" y="0" width="130" height="30" class="header-rect" />
    <text x="65" y="20" class="text-title">ALERTAS</text>
    <text x="10" y="45" class="text-attr">movimentacao_id</text>
    <text x="10" y="60" class="text-attr">tipo</text>
    <text x="10" y="75" class="text-attr">descricao</text>
    <text x="10" y="90" class="text-attr">data_hora</text>
    <text x="10" y="105" class="text-attr">gravidade</text>
  </g>

  <!-- USUARIO -->
  <g transform="translate(250, 480)">
    <rect x="0" y="0" width="130" height="90" class="box" />
    <rect x="0" y="0" width="130" height="30" class="header-rect" />
    <text x="65" y="20" class="text-title">USUARIO</text>
    <text x="10" y="45" class="text-attr">nome</text>
    <text x="10" y="60" class="text-attr">cargo</text>
    <text x="10" y="75" class="text-attr">email</text>
  </g>

  <!-- NOTAS_FISCAIS -->
  <g transform="translate(250, 670)">
    <rect x="0" y="0" width="130" height="90" class="box" />
    <rect x="0" y="0" width="130" height="30" class="header-rect" />
    <text x="65" y="20" class="text-title">NOTAS_FISCAIS</text>
    <text x="10" y="45" class="text-attr">numero</text>
    <text x="10" y="60" class="text-attr">emissor</text>
    <text x="10" y="75" class="text-attr">data_emissao</text>
  </g>

  <!-- LOCAL -->
  <g transform="translate(430, 480)">
    <rect x="0" y="0" width="130" height="105" class="box" />
    <rect x="0" y="0" width="130" height="30" class="header-rect" />
    <text x="65" y="20" class="text-title">LOCAL</text>
    <text x="10" y="45" class="text-attr">nome</text>
    <text x="10" y="60" class="text-attr">cidade</text>
    <text x="10" y="75" class="text-attr">estado</text>
    <text x="10" y="90" class="text-attr">tipo</text>
  </g>

  <!-- Conexões e Losangos (Agregação/Composição) -->
  
  <!-- Produto para Movimentações -->
  <line x1="115" y1="180" x2="115" y2="310" class="line" />
  <polygon points="115,180 122,190 115,200 108,190" class="diamond" />

  <!-- Movimentações para Alertas -->
  <line x1="115" y1="460" x2="115" y2="560" class="line" />
  <polygon points="115,460 122,470 115,480 108,470" class="diamond" />

  <!-- Linha Central de Relacionamento (Movimentações para os outros) -->
  <polyline points="180,385 495,385 495,480" class="line" />
  <line x1="315" y1="385" x2="315" y2="480" class="line" />
  
  <!-- Usuario para Notas Fiscais -->
  <line x1="315" y1="570" x2="315" y2="670" class="line" />

</svg>
