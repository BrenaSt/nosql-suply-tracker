<svg width="960" height="700" viewBox="0 0 960 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Modelagem NoSQL por agregados</title>
  <desc id="desc">Diagrama no estilo do exemplo enviado, usando os agregados definidos no arquivo Markdown: Lote, Produto, Movimentação e Alerta.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="4" stdDeviation="2" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 700 20px Arial, sans-serif; fill: #000000; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 1.4; filter: url(#shadow); }
      .head { fill: #f7f7f7; stroke: #111111; stroke-width: 1.2; }
      .name { font: 700 13px Arial, sans-serif; fill: #000000; }
      .attr { font: 400 11px Arial, sans-serif; fill: #000000; }
      .label { font: 400 10px Arial, sans-serif; fill: #000000; }
      .card { font: 400 10px Arial, sans-serif; fill: #000000; }
      .line { stroke: #111111; stroke-width: 1.25; fill: none; }
      .dash { stroke: #111111; stroke-width: 1.15; fill: none; stroke-dasharray: 5 4; }
      .diamond { fill: #000000; stroke: #000000; stroke-width: 1; }
    </style>
  </defs>

  <rect width="960" height="700" fill="#ffffff"/>
  <text x="480" y="34" text-anchor="middle" class="title">Modelagem NoSQL - Agregados do Sistema</text>

  <!-- Agregado LOTE -->
  <rect x="80" y="78" width="170" height="96" class="box"/>
  <rect x="80" y="78" width="170" height="28" class="head"/>
  <text x="165" y="97" text-anchor="middle" class="name">LOTE</text>
  <line x1="80" y1="106" x2="250" y2="106" class="line"/>
  <text x="96" y="128" class="attr">codigo</text>
  <text x="96" y="144" class="attr">quantidade prevista</text>
  <text x="96" y="160" class="attr">status geral</text>
  <polygon points="165,174 173,184 165,194 157,184" class="diamond"/>

  <!-- Agregado PRODUTO -->
  <rect x="380" y="78" width="180" height="96" class="box"/>
  <rect x="380" y="78" width="180" height="28" class="head"/>
  <text x="470" y="97" text-anchor="middle" class="name">PRODUTO</text>
  <line x1="380" y1="106" x2="560" y2="106" class="line"/>
  <text x="396" y="128" class="attr">codigo</text>
  <text x="396" y="144" class="attr">nome</text>
  <text x="396" y="160" class="attr">status atual</text>
  <polygon points="470,174 478,184 470,194 462,184" class="diamond"/>

  <!-- Agregado MOVIMENTACAO -->
  <rect x="348" y="356" width="210" height="100" class="box"/>
  <rect x="348" y="356" width="210" height="28" class="head"/>
  <text x="453" y="375" text-anchor="middle" class="name">MOVIMENTAÇÃO</text>
  <line x1="348" y1="384" x2="558" y2="384" class="line"/>
  <text x="364" y="406" class="attr">tipo</text>
  <text x="364" y="422" class="attr">data e hora</text>
  <text x="364" y="438" class="attr">resultado da verificação</text>
  <polygon points="453,456 461,466 453,476 445,466" class="diamond"/>

  <!-- Agregado ALERTA -->
  <rect x="700" y="356" width="180" height="100" class="box"/>
  <rect x="700" y="356" width="180" height="28" class="head"/>
  <text x="790" y="375" text-anchor="middle" class="name">ALERTA</text>
  <line x1="700" y1="384" x2="880" y2="384" class="line"/>
  <text x="716" y="406" class="attr">tipo</text>
  <text x="716" y="422" class="attr">gravidade</text>
  <text x="716" y="438" class="attr">status da investigação</text>
  <polygon points="790,456 798,466 790,476 782,466" class="diamond"/>

  <!-- Dados internos de LOTE -->
  <rect x="34" y="270" width="160" height="84" class="box"/>
  <rect x="34" y="270" width="160" height="28" class="head"/>
  <text x="114" y="289" text-anchor="middle" class="name">Documento Fiscal</text>
  <line x1="34" y1="298" x2="194" y2="298" class="line"/>
  <text x="50" y="320" class="attr">nota fiscal</text>
  <text x="50" y="336" class="attr">emissor</text>

  <rect x="214" y="270" width="160" height="84" class="box"/>
  <rect x="214" y="270" width="160" height="28" class="head"/>
  <text x="294" y="289" text-anchor="middle" class="name">Resumo do Lote</text>
  <line x1="214" y1="298" x2="374" y2="298" class="line"/>
  <text x="230" y="320" class="attr">origem</text>
  <text x="230" y="336" class="attr">destino previsto</text>

  <!-- Dados internos de PRODUTO -->
  <rect x="445" y="270" width="170" height="84" class="box"/>
  <rect x="445" y="270" width="170" height="28" class="head"/>
  <text x="530" y="289" text-anchor="middle" class="name">Localização Atual</text>
  <line x1="445" y1="298" x2="615" y2="298" class="line"/>
  <text x="461" y="320" class="attr">local</text>
  <text x="461" y="336" class="attr">cidade</text>

  <rect x="635" y="270" width="180" height="84" class="box"/>
  <rect x="635" y="270" width="180" height="28" class="head"/>
  <text x="725" y="289" text-anchor="middle" class="name">Alertas Ativos</text>
  <line x1="635" y1="298" x2="815" y2="298" class="line"/>
  <text x="651" y="320" class="attr">tipo</text>
  <text x="651" y="336" class="attr">status</text>

  <!-- Dados internos de MOVIMENTACAO -->
  <rect x="250" y="562" width="160" height="84" class="box"/>
  <rect x="250" y="562" width="160" height="28" class="head"/>
  <text x="330" y="581" text-anchor="middle" class="name">Origem</text>
  <line x1="250" y1="590" x2="410" y2="590" class="line"/>
  <text x="266" y="612" class="attr">local</text>
  <text x="266" y="628" class="attr">responsável</text>

  <rect x="430" y="562" width="160" height="84" class="box"/>
  <rect x="430" y="562" width="160" height="28" class="head"/>
  <text x="510" y="581" text-anchor="middle" class="name">Destino</text>
  <line x1="430" y1="590" x2="590" y2="590" class="line"/>
  <text x="446" y="612" class="attr">local</text>
  <text x="446" y="628" class="attr">quantidade confirmada</text>

  <!-- Dados internos de ALERTA -->
  <rect x="690" y="562" width="160" height="84" class="box"/>
  <rect x="690" y="562" width="160" height="28" class="head"/>
  <text x="770" y="581" text-anchor="middle" class="name">Auditoria</text>
  <line x1="690" y1="590" x2="850" y2="590" class="line"/>
  <text x="706" y="612" class="attr">auditor</text>
  <text x="706" y="628" class="attr">parecer</text>

  <!-- Composition lines from LOTE -->
  <path d="M165 194 L165 230 L114 230 L114 270" class="line"/>
  <path d="M165 194 L165 230 L294 230 L294 270" class="line"/>

  <!-- LOTE to PRODUTO relation -->
  <path d="M250 126 L380 126" class="line"/>
  <text x="286" y="118" class="label">agrupa</text>
  <text x="255" y="142" class="card">1</text>
  <text x="365" y="142" class="card">1..n</text>

  <!-- Composition lines from PRODUTO -->
  <path d="M470 194 L470 230 L530 230 L530 270" class="line"/>
  <path d="M470 194 L470 230 L725 230 L725 270" class="line"/>

  <!-- PRODUTO to MOVIMENTACAO relation -->
  <path d="M560 150 L610 150 L610 328 L453 328 L453 356" class="line"/>
  <text x="512" y="320" class="label">possui histórico de</text>
  <text x="464" y="342" class="card">0..n</text>

  <!-- MOVIMENTACAO to ALERTA relation -->
  <path d="M558 406 L700 406" class="line"/>
  <text x="594" y="398" class="label">pode gerar</text>
  <text x="565" y="422" class="card">1</text>
  <text x="684" y="422" class="card">0..n</text>

  <!-- Composition lines from MOVIMENTACAO -->
  <path d="M453 476 L453 520 L330 520 L330 562" class="line"/>
  <path d="M453 476 L453 520 L510 520 L510 562" class="line"/>

  <!-- Composition line from ALERTA -->
  <path d="M790 476 L790 520 L770 520 L770 562" class="line"/>

  <!-- Auxiliary dashed notes -->
  <path d="M530 354 L530 356" class="dash"/>
  <path d="M725 354 L725 356" class="dash"/>

  <text x="480" y="680" text-anchor="middle" class="label">Losango preto = dados que fazem parte do agregado. As relações entre LOTE, PRODUTO, MOVIMENTAÇÃO e ALERTA seguem os agregados descritos no arquivo Markdown.</text>
</svg>
